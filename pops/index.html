<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Father's Day, Pops!</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-900 text-stone-100 min-h-screen font-sans">

    <header class="max-w-4xl mx-auto pt-12 pb-6 px-4 text-center border-b border-stone-800">
        <h1 class="text-4xl md:text-5xl font-serif font-bold text-amber-500 tracking-wide">
            Happy Father's Day, Pops!
        </h1>
        <p class="text-stone-400 mt-2 italic text-lg">The central hub for honoring our family leader and 'parafamilias'.</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 space-y-12">
        
        <section class="bg-stone-800/50 p-6 rounded-xl border border-stone-800">
            <div class="max-w-sm mx-auto bg-stone-800 rounded-lg shadow-xl overflow-hidden border border-stone-700 aspect-square">
                <img src="pops.jpg" alt="Pops" id="pops-photo" class="object-cover w-full h-full">
            </div>
        </section>

        <section class="bg-stone-800/30 border border-stone-800 p-6 rounded-xl">
            <h2 class="text-2xl font-bold text-stone-200 mb-4">Leave a Father's Day Card</h2>
            <form id="card-form" class="space-y-4">
                <div>
                    <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-1" for="author">Your Name</label>
                    <input type="text" id="author" required class="w-full bg-stone-900 border border-stone-700 rounded p-2.5 text-stone-100 focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-1" for="message">Your Message to Pops</label>
                    <textarea id="message" rows="4" required class="w-full bg-stone-900 border border-stone-700 rounded p-2.5 text-stone-100 focus:outline-none focus:border-amber-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-stone-700 hover:bg-stone-600 text-stone-100 font-semibold py-2 px-4 rounded transition duration-200">
                    Submit to Pops Card Board
                </button>
            </form>
        </section>

        <section class="space-y-4">
            <h2 class="text-2xl font-bold text-stone-200">Pops Card Board</h2>
            <div id="cards-container" class="grid sm:grid-cols-2 gap-4">
                <p class="text-stone-500 italic col-span-2 text-center py-4">Connecting to database...</p>
            </div>
        </section>

    </main>

    <footer class="text-center py-12 text-stone-600 text-xs border-t border-stone-800 mt-12">
        Built for Pops.
    </footer>

    <script>
        const dbUrl = "https://pops-3daa5-default-rtdb.firebaseio.com/cards.json";
        const cardForm = document.getElementById('card-form');
        const cardsContainer = document.getElementById('cards-container');

        // Fetch cards from Firebase
        async function fetchCards() {
            try {
                const response = await fetch(dbUrl);
                const data = await response.json();
                cardsContainer.innerHTML = '';

                if (!data) {
                    cardsContainer.innerHTML = `<p class="text-stone-500 italic col-span-2 text-center py-4">No cards submitted yet. Be the first!</p>`;
                    return;
                }

                // Convert Firebase object to array, sort by newest first
                const cards = Object.keys(data).map(key => data[key]).reverse();

                cards.forEach(card => {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = 'bg-stone-800 border border-stone-700 p-5 rounded-lg shadow-md flex flex-col justify-between';
                    cardDiv.innerHTML = `
                        <p class="text-stone-300 italic mb-4">"${escapeHtml(card.message)}"</p>
                        <div class="border-t border-stone-700 pt-2 flex justify-between items-center text-xs text-stone-400">
                            <span class="font-bold text-amber-500">- ${escapeHtml(card.author)}</span>
                            <span>${escapeHtml(card.date)}</span>
                        </div>
                    `;
                    cardsContainer.appendChild(cardDiv);
                });
            } catch (error) {
                cardsContainer.innerHTML = `<p class="text-red-500 italic col-span-2 text-center py-4">Error loading cards. Ensure database rules allow public access.</p>`;
            }
        }

        // Submit card to Firebase
        cardForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const author = document.getElementById('author').value.trim();
            const message = document.getElementById('message').value.trim();
            const date = new Date().toLocaleDateString();

            if (author && message) {
                const newCard = { author, message, date };

                try {
                    await fetch(dbUrl, {
                        method: 'POST',
                        body: JSON.stringify(newCard),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    cardForm.reset();
                    fetchCards();
                } catch (error) {
                    alert('Failed to save card. Check your connection or database rules.');
                }
            }
        });

        // Simple helper to prevent HTML injection
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Initial Load
        fetchCards();
    </script>
</body>
</html>
